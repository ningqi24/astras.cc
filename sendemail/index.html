<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>邮件发送工具</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #16181c;
            --bg-tertiary: #0f1419;
            --text-primary: #e7e9ea;
            --text-secondary: #8b98a5;
            --text-muted: #71767b;
            --border-color: #2f3336;
            --accent-color: #1d9bf0;
            --success-color: #00ba7c;
            --error-color: #f4212e;
        }

        [data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f9fa;
            --bg-tertiary: #ffffff;
            --text-primary: #14171a;
            --text-secondary: #536471;
            --text-muted: #71767b;
            --border-color: #e1e8ed;
            --accent-color: #1d9bf0;
            --success-color: #00ba7c;
            --error-color: #f4212e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 6px;
        }

        .header-btn {
            padding: 8px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        /* Form elements */
        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-color);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }

        select {
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            opacity: 0.8;
        }

        .btn-danger {
            background: var(--error-color);
            color: #fff;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .btn-full {
            width: 100%;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Config list */
        .config-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .config-item:hover {
            border-color: var(--accent-color);
        }

        .config-item.active {
            border-color: var(--accent-color);
            background: rgba(29, 155, 240, 0.1);
        }

        .config-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .config-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .config-type {
            font-size: 12px;
            color: var(--text-muted);
        }

        .config-actions {
            display: flex;
            gap: 6px;
        }

        /* Result */
        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .result.success {
            display: block;
            background: rgba(0, 186, 124, 0.15);
            border: 1px solid rgba(0, 186, 124, 0.3);
            color: var(--success-color);
        }

        .result.error {
            display: block;
            background: rgba(244, 33, 46, 0.15);
            border: 1px solid rgba(244, 33, 46, 0.3);
            color: var(--error-color);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
        }

        /* Protocol badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .badge-api {
            background: rgba(29, 155, 240, 0.2);
            color: var(--accent-color);
        }

        .badge-smtp {
            background: rgba(120, 86, 255, 0.2);
            color: #7856ff;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                    <path d="M22 6l-10 7L2 6" />
                </svg>
                <span data-i18n="title">邮件发送工具</span>
            </h1>
            <div class="header-actions">
                <button class="header-btn" id="langToggle" title="中文/English">
                    <span data-i18n="langBtn">EN</span>
                </button>
                <button class="header-btn" id="themeToggle" title="日/夜间模式">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>
                <button class="btn btn-secondary btn-sm" onclick="openConfigModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span data-i18n="configBtn">配置管理</span>
                </button>
            </div>
        </div>

        <!-- Config selector -->
        <div class="card">
            <div class="card-title" data-i18n="selectConfig">选择发送方式</div>
            <div class="config-list" id="configList">
                <!-- Dynamically rendered -->
            </div>
        </div>

        <!-- Send form -->
        <div class="card">
            <div class="card-title" data-i18n="emailContent">邮件内容</div>
            <form id="emailForm">
                <div class="form-group">
                    <label for="from" data-i18n="sender">发件人（显示名称）</label>
                    <input type="text" id="from" data-placeholder-i18n="senderPlaceholder" placeholder="我的名字 &lt;me@example.com&gt;">
                </div>

                <div class="form-group">
                    <label for="to" data-i18n="recipient">收件人</label>
                    <input type="email" id="to" data-placeholder-i18n="recipientPlaceholder" placeholder="recipient@example.com" required>
                </div>

                <div class="form-group">
                    <label for="subject" data-i18n="subject">主题</label>
                    <input type="text" id="subject" data-placeholder-i18n="subjectPlaceholder" placeholder="邮件主题" required>
                </div>

                <div class="form-group">
                    <label for="content" data-i18n="content">正文（支持 HTML）</label>
                    <textarea id="content" rows="6" data-placeholder-i18n="contentPlaceholder" placeholder="邮件内容..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                    <span data-i18n="sendBtn">发送邮件</span>
                </button>
            </form>

            <div class="result" id="result"></div>
        </div>
    </div>

    <!-- Config Modal -->
    <div class="modal-overlay" id="configModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle" data-i18n="addConfig">添加配置</h3>
                <button class="modal-close" onclick="closeConfigModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="configName" data-i18n="configName">配置名称</label>
                    <input type="text" id="configName" data-placeholder-i18n="configNamePlaceholder" placeholder="例如：我的邮箱">
                </div>

                <div class="form-group">
                    <label for="configType" data-i18n="configType">类型</label>
                    <select id="configType" onchange="toggleConfigFields()">
                        <option value="api" data-i18n="configTypeApi">自定义 API</option>
                        <option value="smtp" data-i18n="configTypeSmtp">SMTP</option>
                    </select>
                </div>

                <!-- API fields -->
                <div id="apiFields">
                    <div class="form-group">
                        <label for="apiUrl" data-i18n="apiUrl">API 地址</label>
                        <input type="url" id="apiUrl" placeholder="https://api.example.com/send">
                    </div>

                    <div class="form-group">
                        <label for="apiMethod" data-i18n="apiMethod">请求方法</label>
                        <select id="apiMethod">
                            <option value="POST">POST</option>
                            <option value="GET">GET</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="apiFormat" data-i18n="apiFormat">参数格式</label>
                        <select id="apiFormat">
                            <option value="json" data-i18n="apiFormatJson">JSON (Body)</option>
                            <option value="query" data-i18n="apiFormatQuery">Query String</option>
                            <option value="form" data-i18n="apiFormatForm">Form Data</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="apiHeaders" data-i18n="apiHeaders">请求头（JSON 格式）</label>
                        <input type="text" id="apiHeaders" placeholder='{"Authorization": "Bearer xxx"}'>
                    </div>

                    <div class="form-group">
                        <label for="apiTemplate" data-i18n="apiTemplate">请求模板（使用 {{to}} {{subject}} {{content}} {{from}}）</label>
                        <textarea id="apiTemplate" rows="4" placeholder='{"to": "{{to}}", "subject": "{{subject}}", "html": "{{content}}"}'></textarea>
                    </div>
                </div>

                <!-- SMTP fields -->
                <div id="smtpFields" class="hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="smtpHost" data-i18n="smtpHost">SMTP 服务器</label>
                            <input type="text" id="smtpHost" placeholder="smtp.gmail.com">
                        </div>
                        <div class="form-group">
                            <label for="smtpPort" data-i18n="smtpPort">端口</label>
                            <input type="number" id="smtpPort" placeholder="587" value="587">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="smtpUser" data-i18n="smtpUser">用户名</label>
                            <input type="text" id="smtpUser" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label for="smtpPass" data-i18n="smtpPass">密码</label>
                            <input type="password" id="smtpPass" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="smtpSecure" data-i18n="smtpSecure">安全协议</label>
                        <select id="smtpSecure">
                            <option value="none" data-i18n="smtpSecureNone">无</option>
                            <option value="ssl" data-i18n="smtpSecureSsl">SSL/TLS</option>
                            <option value="starttls" data-i18n="smtpSecureStarttls">STARTTLS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="smtpFrom" data-i18n="smtpFrom">发件地址</label>
                        <input type="email" id="smtpFrom" placeholder="your@email.com">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeConfigModal()" data-i18n="cancelBtn">取消</button>
                <button class="btn btn-primary" onclick="saveConfig()" data-i18n="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            zh: {
                title: '邮件发送工具',
                langBtn: 'EN',
                configBtn: '配置管理',
                selectConfig: '选择发送方式',

                sender: '发件人（显示名称）',

                apiTemplate: '请求模板（使用 {{to}} {{subject}} {{content}} {{from}}）',
                smtpHost: 'SMTP 服务器',

                smtpUser: '用户名',

                smtpSecure: '安全协议',
                smtpSecureNone: '无',
                smtpSecureSsl: 'SSL/TLS',
                smtpSecureStarttls: 'STARTTLS',
                smtpFrom: '发件地址',
                cancelBtn: '取消',

                editBtn: '编辑',
                deleteBtn: '删除',

                builtIn: '（内置）',
                confirmDelete: '确定要删除这个配置吗？',
                enterConfigName: '请输入配置名称',
                enterApiUrl: '请输入 API 地址',

                selectConfigFirst: '未选择发送配置',
                fillRecipientSubject: '请填写收件人和主题',
                sendSuccess: '发送成功！服务器响应：',

            },
            en: {
                title: 'Email Sender',
                langBtn: '中文',
                configBtn: 'Config',
                selectConfig: 'Select Sender',
                emailContent: 'Email Content',
                sender: 'Sender (Display Name)',
                senderPlaceholder: 'My Name <me@example.com>',
                recipient: 'Recipient',
                recipientPlaceholder: 'recipient@example.com',
                subject: 'Subject',
                subjectPlaceholder: 'Email Subject',
                content: 'Body (HTML supported)',
                contentPlaceholder: 'Email content...',
                sendBtn: 'Send Email',
                addConfig: 'Add Config',
                editConfig: 'Edit Config',
                configName: 'Config Name',
                configNamePlaceholder: 'e.g. My Email',
                configType: 'Type',
                configTypeApi: 'Custom API',
                configTypeSmtp: 'SMTP',
                apiUrl: 'API URL',
                apiMethod: 'Method',
                apiFormat: 'Parameter Format',
                apiFormatJson: 'JSON (Body)',
                apiFormatQuery: 'Query String',
                apiFormatForm: 'Form Data',
                apiHeaders: 'Headers (JSON)',
                apiTemplate: 'Request Template (use {{to}} {{subject}} {{content}} {{from}})',
                smtpHost: 'SMTP Server',
                smtpPort: 'Port',
                smtpUser: 'Username',
                smtpPass: 'Password',
                smtpSecure: 'Security',
                smtpSecureNone: 'None',
                smtpSecureSsl: 'SSL/TLS',
                smtpSecureStarttls: 'STARTTLS',
                smtpFrom: 'From Address',
                cancelBtn: 'Cancel',
                saveBtn: 'Save',
                editBtn: 'Edit',
                deleteBtn: 'Delete',
                addNewConfig: 'Add New Config',
                builtIn: '(Built-in)',
                confirmDelete: 'Are you sure you want to delete this config?',
                enterConfigName: 'Please enter config name',
                enterApiUrl: 'Please enter API URL',
                enterSmtpHost: 'Please enter SMTP server',
                selectConfigFirst: 'No sender config selected',
                fillRecipientSubject: 'Please fill recipient and subject',
                sendSuccess: 'Sent successfully! Server response:',
                sendFailed: 'Send failed (',
                smtpRequiresBackend: 'SMTP requires backend support'
            }
        };

        let currentLang = 'zh';
        let currentTheme = 'dark';

        function loadSettings() {
            const savedLang = localStorage.getItem('emailLang');
            if (savedLang && (savedLang === 'zh' || savedLang === 'en')) {
                currentLang = savedLang;
            }

            const savedTheme = localStorage.getItem('emailTheme');
            if (savedTheme && (savedTheme === 'dark' || savedTheme === 'light')) {
                currentTheme = savedTheme;
            }

            applyTheme();
            applyLang();
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('emailTheme', currentTheme);

            const themeToggle = document.getElementById('themeToggle');
            if (currentTheme === 'dark') {
                themeToggle.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                `;
            } else {
                themeToggle.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                `;
            }
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme();
        }

        function applyLang() {
            document.documentElement.lang = currentLang;
            localStorage.setItem('emailLang', currentLang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });

            document.querySelectorAll('[data-placeholder-i18n]').forEach(el => {
                const key = el.getAttribute('data-placeholder-i18n');
                if (i18n[currentLang][key]) {
                    el.placeholder = i18n[currentLang][key];
                }
            });

            document.querySelectorAll('option[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });

            renderConfigList();
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            applyLang();
        }

        let configs = [];
        let activeConfigId = null;
        let editingConfigId = null;

        const defaultConfig = {
            id: 'default',
            name: currentLang === 'zh' ? 'Astras API（默认）' : 'Astras API (Default)',
            type: 'api',
            isDefault: true,
            apiUrl: 'https://api.astras.cc/sendemail',
            apiMethod: 'POST',
            apiFormat: 'query',
            apiHeaders: '{}',
            apiTemplate: ''
        };

        function loadConfigs() {
            try {
                const saved = localStorage.getItem('emailConfigs');
                if (saved) {
                    configs = JSON.parse(saved);
                }
            } catch (e) {
                configs = [];
            }

            if (!configs.find(c => c.id === 'default')) {
                configs.unshift(defaultConfig);
            }

            const savedActiveId = localStorage.getItem('activeEmailConfig');
            if (savedActiveId && configs.find(c => c.id === savedActiveId)) {
                activeConfigId = savedActiveId;
            } else {
                activeConfigId = 'default';
            }
        }

        function saveConfigs() {
            const customConfigs = configs.filter(c => !c.isDefault);
            localStorage.setItem('emailConfigs', JSON.stringify(customConfigs));
            localStorage.setItem('activeEmailConfig', activeConfigId);
        }

        function renderConfigList() {
            const list = document.getElementById('configList');
            list.innerHTML = '';

            configs.forEach(config => {
                const item = document.createElement('div');
                item.className = 'config-item' + (config.id === activeConfigId ? ' active' : '');
                item.onclick = () => selectConfig(config.id);

                item.innerHTML = `
                    <div class="config-info">
                        <div class="config-name">${escapeHtml(config.name)}</div>
                        <div class="config-type">
                            <span class="badge badge-${config.type}">${config.type === 'api' ? 'API' : 'SMTP'}</span>
                            ${config.isDefault ? `<span style="color: var(--text-muted); margin-left: 6px;">${i18n[currentLang].builtIn}</span>` : ''}
                        </div>
                    </div>
                    <div class="config-actions">
                        ${!config.isDefault ? `
                            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); editConfig('${config.id}')">${i18n[currentLang].editBtn}</button>
                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteConfig('${config.id}')">${i18n[currentLang].deleteBtn}</button>
                        ` : ''}
                    </div>
                `;

                list.appendChild(item);
            });

            const addBtn = document.createElement('div');
            addBtn.className = 'config-item';
            addBtn.style.borderStyle = 'dashed';
            addBtn.style.justifyContent = 'center';
            addBtn.style.cursor = 'pointer';
            addBtn.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                ${i18n[currentLang].addNewConfig}
            `;
            addBtn.onclick = () => openConfigModal();
            list.appendChild(addBtn);
        }

        function selectConfig(id) {
            activeConfigId = id;
            saveConfigs();
            renderConfigList();
        }

        function openConfigModal(id = null) {
            editingConfigId = id;
            const modal = document.getElementById('configModal');
            const title = document.getElementById('modalTitle');

            if (id) {
                const config = configs.find(c => c.id === id);
                if (config) {
                    title.textContent = i18n[currentLang].editConfig;
                    document.getElementById('configName').value = config.name;
                    document.getElementById('configType').value = config.type;

                    if (config.type === 'api') {
                        document.getElementById('apiUrl').value = config.apiUrl || '';
                        document.getElementById('apiMethod').value = config.apiMethod || 'POST';
                        document.getElementById('apiFormat').value = config.apiFormat || 'json';
                        document.getElementById('apiHeaders').value = config.apiHeaders || '{}';
                        document.getElementById('apiTemplate').value = config.apiTemplate || '';
                    } else {
                        document.getElementById('smtpHost').value = config.smtpHost || '';
                        document.getElementById('smtpPort').value = config.smtpPort || 587;
                        document.getElementById('smtpUser').value = config.smtpUser || '';
                        document.getElementById('smtpPass').value = config.smtpPass || '';
                        document.getElementById('smtpSecure').value = config.smtpSecure || 'none';
                        document.getElementById('smtpFrom').value = config.smtpFrom || '';
                    }
                }
            } else {
                title.textContent = i18n[currentLang].addConfig;
                clearConfigForm();
            }

            toggleConfigFields();
            modal.classList.add('show');
        }

        function closeConfigModal() {
            document.getElementById('configModal').classList.remove('show');
            editingConfigId = null;
        }

        function toggleConfigFields() {
            const type = document.getElementById('configType').value;
            document.getElementById('apiFields').classList.toggle('hidden', type !== 'api');
            document.getElementById('smtpFields').classList.toggle('hidden', type !== 'smtp');
        }

        function clearConfigForm() {
            document.getElementById('configName').value = '';
            document.getElementById('configType').value = 'api';
            document.getElementById('apiUrl').value = '';
            document.getElementById('apiMethod').value = 'POST';
            document.getElementById('apiFormat').value = 'json';
            document.getElementById('apiHeaders').value = '{}';
            document.getElementById('apiTemplate').value = '';
            document.getElementById('smtpHost').value = '';
            document.getElementById('smtpPort').value = 587;
            document.getElementById('smtpUser').value = '';
            document.getElementById('smtpPass').value = '';
            document.getElementById('smtpSecure').value = 'none';
            document.getElementById('smtpFrom').value = '';
        }

        function saveConfig() {
            const name = document.getElementById('configName').value.trim();
            const type = document.getElementById('configType').value;

            if (!name) {
                alert(i18n[currentLang].enterConfigName);
                return;
            }

            const config = {
                id: editingConfigId || 'config_' + Date.now(),
                name: name,
                type: type
            };

            if (type === 'api') {
                const apiUrl = document.getElementById('apiUrl').value.trim();
                if (!apiUrl) {
                    alert(i18n[currentLang].enterApiUrl);
                    return;
                }
                config.apiUrl = apiUrl;
                config.apiMethod = document.getElementById('apiMethod').value;
                config.apiFormat = document.getElementById('apiFormat').value;
                config.apiHeaders = document.getElementById('apiHeaders').value;
                config.apiTemplate = document.getElementById('apiTemplate').value;
            } else {
                const smtpHost = document.getElementById('smtpHost').value.trim();
                if (!smtpHost) {
                    alert(i18n[currentLang].enterSmtpHost);
                    return;
                }
                config.smtpHost = smtpHost;
                config.smtpPort = parseInt(document.getElementById('smtpPort').value) || 587;
                config.smtpUser = document.getElementById('smtpUser').value;
                config.smtpPass = document.getElementById('smtpPass').value;
                config.smtpSecure = document.getElementById('smtpSecure').value;
                config.smtpFrom = document.getElementById('smtpFrom').value;
            }

            if (editingConfigId) {
                const idx = configs.findIndex(c => c.id === editingConfigId);
                if (idx > -1) {
                    configs[idx] = config;
                }
            } else {
                configs.push(config);
            }

            saveConfigs();
            closeConfigModal();
            renderConfigList();
        }

        function editConfig(id) {
            openConfigModal(id);
        }

        function deleteConfig(id) {
            if (confirm(i18n[currentLang].confirmDelete)) {
                configs = configs.filter(c => c.id !== id);
                if (activeConfigId === id) {
                    activeConfigId = 'default';
                }
                saveConfigs();
                renderConfigList();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendEmail(e) {
            e.preventDefault();

            const config = configs.find(c => c.id === activeConfigId);
            if (!config) {
                showResult('error', i18n[currentLang].selectConfigFirst);
                return;
            }

            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const subject = document.getElementById('subject').value;
            const content = document.getElementById('content').value;

            if (!to || !subject) {
                showResult('error', i18n[currentLang].fillRecipientSubject);
                return;
            }

            try {
                if (config.isDefault) {
                    sendViaForm({ from, to, subject, content });
                } else if (config.type === 'api') {
                    await sendViaApi(config, { from, to, subject, content });
                } else {
                    await sendViaSmtp(config, { from, to, subject, content });
                }
            } catch (error) {
                showResult('error', i18n[currentLang].sendFailed + error.message);
            }
        }

        // 默认API：参数放URL查询字符串 + POST，不受CORS限制
        function sendViaForm(data) {
            const apiUrl = `https://api.astras.cc/sendemail?to=${encodeURIComponent(data.to)}&subject=${encodeURIComponent(data.subject)}&contenthtml=${encodeURIComponent(data.content)}`;

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = apiUrl;
            form.target = 'sendResult';

            let iframe = document.getElementById('sendResultFrame');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'sendResultFrame';
                iframe.name = 'sendResult';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
            }

            let loaded = false;
            iframe.onload = function() {
                if (loaded) return;
                loaded = true;

                try {
                    const resultText = iframe.contentDocument?.body?.innerText || '';
                    if (resultText.includes('success') || resultText.includes('200') || resultText.toLowerCase().includes('ok') || resultText.includes('发送成功')) {
                        showResult('success', i18n[currentLang].sendSuccess + resultText);
                    } else if (resultText && !resultText.includes('error') && !resultText.includes('Failed')) {
                        showResult('success', i18n[currentLang].sendSuccess + resultText);
                    } else if (resultText) {
                        showResult('error', resultText);
                    } else {
                        showResult('success', i18n[currentLang].sendSuccess);
                    }
                } catch (e) {
                    showResult('success', i18n[currentLang].sendSuccess);
                }
            };

            form.onsubmit = function() {
                setTimeout(() => {
                    if (!loaded) {
                        showResult('success', i18n[currentLang].sendSuccess);
                    }
                }, 2000);
            };

            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        async function sendViaApi(config, data) {
            let url = config.apiUrl;
            let options = {
                method: config.apiMethod,
                headers: {}
            };

            try {
                const headers = JSON.parse(config.apiHeaders || '{}');
                Object.assign(options.headers, headers);
            } catch (e) {}

            // Build body
            let body = config.apiTemplate || '';
            let hasTemplate = !!body;

            if (body) {
                body = body
                    .replace(/\{\{to\}\}/g, data.to)
                    .replace(/\{\{subject\}\}/g, data.subject)
                    .replace(/\{\{content\}\}/g, data.content)
                    .replace(/\{\{from\}\}/g, data.from);
            }

            // Apply format-specific processing (only if no template)
            if (!hasTemplate) {
                if (config.apiFormat === 'query') {
                    if (config.apiMethod === 'GET') {
                        const params = new URLSearchParams({
                            to: data.to,
                            subject: data.subject,
                            contenthtml: data.content
                        });
                        url += (url.includes('?') ? '&' : '?') + params.toString();
                        body = null;
                    } else {
                        const params = new URLSearchParams({
                            to: data.to,
                            subject: data.subject,
                            contenthtml: data.content
                        });
                        body = params.toString();
                        options.headers['Content-Type'] = 'application/x-www-form-urlencoded';
                    }
                } else if (config.apiFormat === 'form') {
                    const form = new URLSearchParams();
                    form.append('to', data.to);
                    form.append('subject', data.subject);
                    form.append('contenthtml', data.content);
                    body = form.toString();
                    options.headers['Content-Type'] = 'application/x-www-form-urlencoded';
                } else {
                    body = JSON.stringify({
                        to: data.to,
                        subject: data.subject,
                        content: data.content,
                        from: data.from
                    });
                    options.headers['Content-Type'] = 'application/json';
                }
            } else {
                // Has template - assume form-urlencoded for query/form formats, JSON for json format
                if (config.apiFormat === 'form' || config.apiFormat === 'query') {
                    options.headers['Content-Type'] = 'application/x-www-form-urlencoded';
                } else if (config.apiFormat === 'json') {
                    options.headers['Content-Type'] = 'application/json';
                }
            }

            if (body) {
                options.body = body;
            }

            const response = await fetch(url, options);
            const text = await response.text();

            if (response.ok) {
                showResult('success', i18n[currentLang].sendSuccess + text);
            } else {
                showResult('error', i18n[currentLang].sendFailed + response.status + ')：' + text);
            }
        }

        async function sendViaSmtp(config, data) {
            const smtpProxyUrl = 'https://api.astras.cc/smtp-proxy';

            const response = await fetch(smtpProxyUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    smtp: {
                        host: config.smtpHost,
                        port: config.smtpPort,
                        user: config.smtpUser,
                        pass: config.smtpPass,
                        secure: config.smtpSecure
                    },
                    email: {
                        from: config.smtpFrom,
                        to: data.to,
                        subject: data.subject,
                        html: data.content
                    }
                })
            });

            const text = await response.text();

            if (response.ok) {
                showResult('success', i18n[currentLang].sendSuccess + text);
            } else {
                showResult('error', i18n[currentLang].sendFailed + response.status + ')：' + text);
            }
        }

        function showResult(type, message) {
            const result = document.getElementById('result');
            result.className = 'result ' + type;
            result.textContent = message;
            result.style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            loadConfigs();
            renderConfigList();

            document.getElementById('emailForm').addEventListener('submit', sendEmail);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('langToggle').addEventListener('click', toggleLang);
        });
    </script>

</body>
