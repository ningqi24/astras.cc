<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>邮件发送工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0f1419;
            min-height: 100vh;
            color: #e7e9ea;
            padding: 20px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2f3336;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: #16181c;
            padding: 4px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            border: none;
            color: #71767b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: #1d1f23;
        }

        .tab-btn.active {
            background: #1d9bf0;
            color: #fff;
        }

        /* Cards */
        .card {
            background: #16181c;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e7e9ea;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #8b98a5;
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
            background: #0f1419;
            border: 1px solid #2f3336;
            border-radius: 6px;
            color: #e7e9ea;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #1d9bf0;
        }

        input::placeholder, textarea::placeholder {
            color: #536471;
        }

        select {
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: #1d9bf0;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1a8cd8;
        }

        .btn-secondary {
            background: #2f3336;
            color: #e7e9ea;
        }

        .btn-secondary:hover {
            background: #3c4146;
        }

        .btn-danger {
            background: #f4212e;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc1e2a;
        }

        .btn-full {
            width: 100%;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Config list */
        .config-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .config-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #0f1419;
            border: 1px solid #2f3336;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .config-item:hover {
            border-color: #1d9bf0;
        }

        .config-item.active {
            border-color: #1d9bf0;
            background: rgba(29, 155, 240, 0.1);
        }

        .config-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .config-name {
            font-weight: 500;
            color: #e7e9ea;
        }

        .config-type {
            font-size: 12px;
            color: #71767b;
        }

        .config-actions {
            display: flex;
            gap: 6px;
        }

        /* Result */
        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        .result.success {
            display: block;
            background: rgba(0, 186, 124, 0.15);
            border: 1px solid rgba(0, 186, 124, 0.3);
            color: #00ba7c;
        }

        .result.error {
            display: block;
            background: rgba(244, 33, 46, 0.15);
            border: 1px solid rgba(244, 33, 46, 0.3);
            color: #f4212e;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #16181c;
            border: 1px solid #2f3336;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #2f3336;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: #71767b;
            cursor: pointer;
            padding: 4px;
        }

        .modal-close:hover {
            color: #e7e9ea;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 16px 20px;
            border-top: 1px solid #2f3336;
        }

        /* Protocol badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .badge-api {
            background: rgba(29, 155, 240, 0.2);
            color: #1d9bf0;
        }

        .badge-smtp {
            background: rgba(120, 86, 255, 0.2);
            color: #7856ff;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                    <path d="M22 6l-10 7L2 6" />
                </svg>
                邮件发送工具
            </h1>
            <div class="header-actions">
                <button class="btn btn-secondary btn-sm" onclick="openConfigModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    配置管理
                </button>
            </div>
        </div>

        <!-- Config selector -->
        <div class="card">
            <div class="card-title">选择发送方式</div>
            <div class="config-list" id="configList">
                <!-- Dynamically rendered -->
            </div>
        </div>

        <!-- Send form -->
        <div class="card">
            <div class="card-title">邮件内容</div>
            <form id="emailForm">
                <div class="form-group">
                    <label for="from">发件人（显示名称）</label>
                    <input type="text" id="from" placeholder="我的名字 &lt;me@example.com&gt;">
                </div>

                <div class="form-group">
                    <label for="to">收件人</label>
                    <input type="email" id="to" placeholder="recipient@example.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">主题</label>
                    <input type="text" id="subject" placeholder="邮件主题" required>
                </div>

                <div class="form-group">
                    <label for="content">正文（支持 HTML）</label>
                    <textarea id="content" rows="6" placeholder="邮件内容..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                    发送邮件
                </button>
            </form>

            <div class="result" id="result"></div>
        </div>
    </div>

    <!-- Config Modal -->
    <div class="modal-overlay" id="configModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加配置</h3>
                <button class="modal-close" onclick="closeConfigModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="configName">配置名称</label>
                    <input type="text" id="configName" placeholder="例如：我的邮箱">
                </div>

                <div class="form-group">
                    <label for="configType">类型</label>
                    <select id="configType" onchange="toggleConfigFields()">
                        <option value="api">自定义 API</option>
                        <option value="smtp">SMTP</option>
                    </select>
                </div>

                <!-- API fields -->
                <div id="apiFields">
                    <div class="form-group">
                        <label for="apiUrl">API 地址</label>
                        <input type="url" id="apiUrl" placeholder="https://api.example.com/send">
                    </div>

                    <div class="form-group">
                        <label for="apiMethod">请求方法</label>
                        <select id="apiMethod">
                            <option value="POST">POST</option>
                            <option value="GET">GET</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="apiFormat">参数格式</label>
                        <select id="apiFormat">
                            <option value="json">JSON (Body)</option>
                            <option value="query">Query String</option>
                            <option value="form">Form Data</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="apiHeaders">请求头（JSON 格式）</label>
                        <input type="text" id="apiHeaders" placeholder='{"Authorization": "Bearer xxx"}'>
                    </div>

                    <div class="form-group">
                        <label for="apiTemplate">请求模板（使用 {{to}} {{subject}} {{content}} {{from}}）</label>
                        <textarea id="apiTemplate" rows="4" placeholder='{"to": "{{to}}", "subject": "{{subject}}", "html": "{{content}}"}'></textarea>
                    </div>
                </div>

                <!-- SMTP fields -->
                <div id="smtpFields" class="hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="smtpHost">SMTP 服务器</label>
                            <input type="text" id="smtpHost" placeholder="smtp.gmail.com">
                        </div>
                        <div class="form-group">
                            <label for="smtpPort">端口</label>
                            <input type="number" id="smtpPort" placeholder="587" value="587">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="smtpUser">用户名</label>
                            <input type="text" id="smtpUser" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label for="smtpPass">密码</label>
                            <input type="password" id="smtpPass" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="smtpSecure">安全协议</label>
                        <select id="smtpSecure">
                            <option value="none">无</option>
                            <option value="ssl">SSL/TLS</option>
                            <option value="starttls">STARTTLS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="smtpFrom">发件地址</label>
                        <input type="email" id="smtpFrom" placeholder="your@email.com">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="saveConfig()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // Config storage
        let configs = [];
        let activeConfigId = null;
        let editingConfigId = null;

        // Default config
        const defaultConfig = {
            id: 'default',
            name: 'Astras API（默认）',
            type: 'api',
            isDefault: true,
            apiUrl: 'https://api.astras.cc/sendemail',
            apiMethod: 'POST',
            apiFormat: 'query',
            apiHeaders: '{}',
            apiTemplate: ''
        };

        // Load configs from localStorage
        function loadConfigs() {
            try {
                const saved = localStorage.getItem('emailConfigs');
                if (saved) {
                    configs = JSON.parse(saved);
                }
            } catch (e) {
                configs = [];
            }

            // Always include default config
            if (!configs.find(c => c.id === 'default')) {
                configs.unshift(defaultConfig);
            }

            const savedActiveId = localStorage.getItem('activeEmailConfig');
            if (savedActiveId && configs.find(c => c.id === savedActiveId)) {
                activeConfigId = savedActiveId;
            } else {
                activeConfigId = 'default';
            }
        }

        // Save configs to localStorage
        function saveConfigs() {
            const customConfigs = configs.filter(c => !c.isDefault);
            localStorage.setItem('emailConfigs', JSON.stringify(customConfigs));
            localStorage.setItem('activeEmailConfig', activeConfigId);
        }

        // Render config list
        function renderConfigList() {
            const list = document.getElementById('configList');
            list.innerHTML = '';

            configs.forEach(config => {
                const item = document.createElement('div');
                item.className = 'config-item' + (config.id === activeConfigId ? ' active' : '');
                item.onclick = () => selectConfig(config.id);

                item.innerHTML = `
                    <div class="config-info">
                        <div class="config-name">${escapeHtml(config.name)}</div>
                        <div class="config-type">
                            <span class="badge badge-${config.type}">${config.type === 'api' ? 'API' : 'SMTP'}</span>
                            ${config.isDefault ? '<span style="color: #71767b; margin-left: 6px;">（内置）</span>' : ''}
                        </div>
                    </div>
                    <div class="config-actions">
                        ${!config.isDefault ? `
                            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); editConfig('${config.id}')">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteConfig('${config.id}')">删除</button>
                        ` : ''}
                    </div>
                `;

                list.appendChild(item);
            });

            // Add new config button
            const addBtn = document.createElement('div');
            addBtn.className = 'config-item';
            addBtn.style.borderStyle = 'dashed';
            addBtn.style.justifyContent = 'center';
            addBtn.style.cursor = 'pointer';
            addBtn.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                添加新配置
            `;
            addBtn.onclick = () => openConfigModal();
            list.appendChild(addBtn);
        }

        // Select config
        function selectConfig(id) {
            activeConfigId = id;
            saveConfigs();
            renderConfigList();
        }

        // Open config modal
        function openConfigModal(id = null) {
            editingConfigId = id;
            const modal = document.getElementById('configModal');
            const title = document.getElementById('modalTitle');

            if (id) {
                const config = configs.find(c => c.id === id);
                if (config) {
                    title.textContent = '编辑配置';
                    document.getElementById('configName').value = config.name;
                    document.getElementById('configType').value = config.type;

                    if (config.type === 'api') {
                        document.getElementById('apiUrl').value = config.apiUrl || '';
                        document.getElementById('apiMethod').value = config.apiMethod || 'POST';
                        document.getElementById('apiFormat').value = config.apiFormat || 'json';
                        document.getElementById('apiHeaders').value = config.apiHeaders || '{}';
                        document.getElementById('apiTemplate').value = config.apiTemplate || '';
                    } else {
                        document.getElementById('smtpHost').value = config.smtpHost || '';
                        document.getElementById('smtpPort').value = config.smtpPort || 587;
                        document.getElementById('smtpUser').value = config.smtpUser || '';
                        document.getElementById('smtpPass').value = config.smtpPass || '';
                        document.getElementById('smtpSecure').value = config.smtpSecure || 'none';
                        document.getElementById('smtpFrom').value = config.smtpFrom || '';
                    }
                }
            } else {
                title.textContent = '添加配置';
                clearConfigForm();
            }

            toggleConfigFields();
            modal.classList.add('show');
        }

        // Close config modal
        function closeConfigModal() {
            document.getElementById('configModal').classList.remove('show');
            editingConfigId = null;
        }

        // Toggle config fields based on type
        function toggleConfigFields() {
            const type = document.getElementById('configType').value;
            document.getElementById('apiFields').classList.toggle('hidden', type !== 'api');
            document.getElementById('smtpFields').classList.toggle('hidden', type !== 'smtp');
        }

        // Clear config form
        function clearConfigForm() {
            document.getElementById('configName').value = '';
            document.getElementById('configType').value = 'api';
            document.getElementById('apiUrl').value = '';
            document.getElementById('apiMethod').value = 'POST';
            document.getElementById('apiFormat').value = 'json';
            document.getElementById('apiHeaders').value = '{}';
            document.getElementById('apiTemplate').value = '';
            document.getElementById('smtpHost').value = '';
            document.getElementById('smtpPort').value = 587;
            document.getElementById('smtpUser').value = '';
            document.getElementById('smtpPass').value = '';
            document.getElementById('smtpSecure').value = 'none';
            document.getElementById('smtpFrom').value = '';
        }

        // Save config
        function saveConfig() {
            const name = document.getElementById('configName').value.trim();
            const type = document.getElementById('configType').value;

            if (!name) {
                alert('请输入配置名称');
                return;
            }

            const config = {
                id: editingConfigId || 'config_' + Date.now(),
                name: name,
                type: type
            };

            if (type === 'api') {
                const apiUrl = document.getElementById('apiUrl').value.trim();
                if (!apiUrl) {
                    alert('请输入 API 地址');
                    return;
                }
                config.apiUrl = apiUrl;
                config.apiMethod = document.getElementById('apiMethod').value;
                config.apiFormat = document.getElementById('apiFormat').value;
                config.apiHeaders = document.getElementById('apiHeaders').value;
                config.apiTemplate = document.getElementById('apiTemplate').value;
            } else {
                const smtpHost = document.getElementById('smtpHost').value.trim();
                if (!smtpHost) {
                    alert('请输入 SMTP 服务器');
                    return;
                }
                config.smtpHost = smtpHost;
                config.smtpPort = parseInt(document.getElementById('smtpPort').value) || 587;
                config.smtpUser = document.getElementById('smtpUser').value;
                config.smtpPass = document.getElementById('smtpPass').value;
                config.smtpSecure = document.getElementById('smtpSecure').value;
                config.smtpFrom = document.getElementById('smtpFrom').value;
            }

            // Update or add
            if (editingConfigId) {
                const idx = configs.findIndex(c => c.id === editingConfigId);
                if (idx > -1) {
                    configs[idx] = config;
                }
            } else {
                configs.push(config);
            }

            saveConfigs();
            closeConfigModal();
            renderConfigList();
        }

        // Edit config
        function editConfig(id) {
            openConfigModal(id);
        }

        // Delete config
        function deleteConfig(id) {
            if (confirm('确定要删除这个配置吗？')) {
                configs = configs.filter(c => c.id !== id);
                if (activeConfigId === id) {
                    activeConfigId = 'default';
                }
                saveConfigs();
                renderConfigList();
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Send email
        async function sendEmail(e) {
            e.preventDefault();

            const config = configs.find(c => c.id === activeConfigId);
            if (!config) {
                showResult('error', '未选择发送配置');
                return;
            }

            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const subject = document.getElementById('subject').value;
            const content = document.getElementById('content').value;

            if (!to || !subject) {
                showResult('error', '请填写收件人和主题');
                return;
            }

            try {
                if (config.type === 'api') {
                    await sendViaApi(config, { from, to, subject, content });
                } else {
                    await sendViaSmtp(config, { from, to, subject, content });
                }
            } catch (error) {
                showResult('error', '发送失败：' + error.message);
            }
        }

        // Send via API
        async function sendViaApi(config, data) {
            let url = config.apiUrl;
            let options = {
                method: config.apiMethod,
                headers: {}
            };

            // Parse headers
            try {
                const headers = JSON.parse(config.apiHeaders || '{}');
                Object.assign(options.headers, headers);
            } catch (e) {}

            // Build body
            let body = config.apiTemplate || '';

            if (body) {
                // Replace template variables
                body = body
                    .replace(/\{\{to\}\}/g, data.to)
                    .replace(/\{\{subject\}\}/g, data.subject)
                    .replace(/\{\{content\}\}/g, data.content)
                    .replace(/\{\{from\}\}/g, data.from);
            } else {
                body = JSON.stringify({
                    to: data.to,
                    subject: data.subject,
                    content: data.content,
                    from: data.from
                });
            }

            if (config.apiFormat === 'query') {
                if (config.apiMethod === 'GET') {
                    const params = new URLSearchParams({
                        to: data.to,
                        subject: data.subject,
                        contenthtml: data.content
                    });
                    url += (url.includes('?') ? '&' : '?') + params.toString();
                } else {
                    const params = new URLSearchParams({
                        to: data.to,
                        subject: data.subject,
                        contenthtml: data.content
                    });
                    body = params.toString();
                    options.headers['Content-Type'] = 'application/x-www-form-urlencoded';
                }
            } else if (config.apiFormat === 'form') {
                const form = new URLSearchParams();
                form.append('to', data.to);
                form.append('subject', data.subject);
                form.append('content', data.content);
                body = form.toString();
                options.headers['Content-Type'] = 'application/x-www-form-urlencoded';
            } else {
                options.headers['Content-Type'] = 'application/json';
            }

            options.body = body;

            const response = await fetch(url, options);
            const text = await response.text();

            if (response.ok) {
                showResult('success', '发送成功！服务器响应：' + text);
            } else {
                showResult('error', '发送失败（' + response.status + '）：' + text);
            }
        }

        // Send via SMTP (requires backend proxy)
        async function sendViaSmtp(config, data) {
            // SMTP requires a backend service
            // For now, show a message that SMTP needs backend support
            const smtpProxyUrl = 'https://api.astras.cc/smtp-proxy';

            const response = await fetch(smtpProxyUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    smtp: {
                        host: config.smtpHost,
                        port: config.smtpPort,
                        user: config.smtpUser,
                        pass: config.smtpPass,
                        secure: config.smtpSecure
                    },
                    email: {
                        from: config.smtpFrom,
                        to: data.to,
                        subject: data.subject,
                        html: data.content
                    }
                })
            });

            const text = await response.text();

            if (response.ok) {
                showResult('success', '发送成功！服务器响应：' + text);
            } else {
                showResult('error', '发送失败（' + response.status + '）：' + text);
            }
        }

        // Show result
        function showResult(type, message) {
            const result = document.getElementById('result');
            result.className = 'result ' + type;
            result.textContent = message;
            result.style.display = 'block';
        }

        // Init
        loadConfigs();
        renderConfigList();
        document.getElementById('emailForm').addEventListener('submit', sendEmail);
    </script>
