<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发送邮件</title>
    <style>
        /* 全局重置 & 字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f7f8fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1e293b;
        }

        /* 卡片 – 极简白，无阴影，只留细边框 */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 32px 28px;
            border: 1px solid #e2e8f0;
            border-radius: 0; /* 直角，更朴素 */
            transition: border-color 0.2s;
        }

        /* 标题行 – 用 SVG 图标 + 文字 */
        .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e9edf2;
        }

        .title-row svg {
            flex-shrink: 0;
        }

        .title-row h2 {
            font-weight: 450;
            font-size: 20px;
            letter-spacing: 0.3px;
            color: #0b1d2e;
        }

        /* 表单元素 */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 450;
            color: #334155;
            margin-bottom: 5px;
            letter-spacing: 0.2px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            font-family: inherit;
            background: #ffffff;
            border: 1px solid #d1d9e6;
            border-radius: 0;
            transition: border 0.15s, background 0.15s;
            color: #1e293b;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #7b8ba3;
            background: #fafbfc;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* 按钮 – 朴素，无渐变，无圆角 */
        button {
            width: 100%;
            padding: 12px 16px;
            margin-top: 8px;
            background: #1e293b;
            color: #ffffff;
            font-size: 16px;
            font-weight: 450;
            font-family: inherit;
            border: 1px solid #1e293b;
            border-radius: 0;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: #0f172a;
            border-color: #0f172a;
        }

        button:active {
            background: #334155;
        }

        /* 结果提示区 */
        #result {
            margin-top: 20px;
            padding: 12px 14px;
            font-size: 14px;
            border: 1px solid transparent;
            border-radius: 0;
            background: #f1f4f9;
            color: #1e293b;
            display: none; /* 初始隐藏 */
        }

        #result.success {
            display: block;
            border-color: #b0c9b4;
            background: #eef5ef;
            color: #1f3b2c;
        }

        #result.error {
            display: block;
            border-color: #e3b8b8;
            background: #f9efef;
            color: #632e2e;
        }

        /* 小屏优化 */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 标题：SVG 邮件图标 + 文字 -->
        <div class="title-row">
            <!-- 简洁邮件图标 -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="M22 6l-10 7L2 6" />
            </svg>
            <h2>发送邮件</h2>
        </div>

        <!-- 表单 -->
        <form id="emailForm">
            <div class="form-group">
                <label for="to">收件人</label>
                <input type="email" id="to" value="lyy201314_2023@qq.com" placeholder="example@domain.com" required>
            </div>

            <div class="form-group">
                <label for="subject">主题</label>
                <input type="text" id="subject" value="Hello" placeholder="邮件主题" required>
            </div>

            <div class="form-group">
                <label for="content">内容（支持 HTML）</label>
                <textarea id="content" rows="5" placeholder="写邮件内容…"><h1>Test</h1></textarea>
            </div>

            <button type="submit">
                <!-- 发送图标 SVG（纸飞机） -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                </svg>
                发送
            </button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById('emailForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const to = document.getElementById('to').value;
            const subject = document.getElementById('subject').value;
            const content = document.getElementById('content').value;
            const resultDiv = document.getElementById('result');

            // 编码参数
            const apiUrl =
                `https://api.astras.cc/sendemail?to=${encodeURIComponent(to)}&subject=${encodeURIComponent(subject)}&contenthtml=${encodeURIComponent(content)}`;

            try {
                const response = await fetch(apiUrl, { method: 'POST' });
                const text = await response.text();

                resultDiv.className = 'success';
                resultDiv.textContent = `成功 — 服务器响应：${text}`;
                resultDiv.style.display = 'block';
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = `失败 — ${error.message}`;
                resultDiv.style.display = 'block';
            }
        });
    </script>

</body>
</html>
