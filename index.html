<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astras.CC - 第三方网站导航</title>
  <link rel="icon" href="images/logo-white.svg" type="image/svg+xml">
  <style>
    :root {
      --bg-color: #0a0a0a;
      --bg-secondary: #141414;
      --bg-card: #1a1a1a;
      --text-primary: #ffffff;
      --text-secondary: #999999;
      --text-muted: #666666;
      --accent-color: #00d4ff;
      --accent-hover: rgba(0, 212, 255, 0.15);
      --border-color: #2a2a2a;
      --border-hover: rgba(0, 212, 255, 0.3);
      --font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .daylight-mode {
      --bg-color: #f8f8f8;
      --bg-secondary: #f0f0f0;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --accent-color: #0099cc;
      --accent-hover: rgba(0, 153, 204, 0.1);
      --border-color: #e0e0e0;
      --border-hover: rgba(0, 153, 204, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-color);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .daylight-mode .header {
      background: rgba(255, 255, 255, 0.9);
    }

    .header-logo {
      height: 36px;
      width: auto;
      display: flex;
      align-items: center;
    }

    .header-logo img {
      height: 100%;
      width: auto;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      height: 36px;
      padding: 0 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-family);
    }

    .btn-icon {
      background: var(--bg-secondary);
      color: var(--text-primary);
      width: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon:hover {
      background: var(--accent-hover);
      color: var(--accent-color);
    }

    .btn-text {
      background: transparent;
      color: var(--text-secondary);
    }

    .btn-text:hover {
      color: var(--accent-color);
    }

    .main {
      padding-top: 80px;
      padding-bottom: 100px;
      min-height: 100vh;
    }

    .hero {
      text-align: center;
      padding: 40px 24px 60px;
    }

    .hero-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent-color), #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 400px;
      margin: 0 auto;
    }

    .cards-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px 24px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      color: var(--accent-color);
    }

    .card-content {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-arrow {
      color: var(--text-muted);
      transition: color 0.2s ease;
      flex-shrink: 0;
    }

    .card:hover .card-arrow {
      color: var(--accent-color);
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-color);
      padding: 16px 24px;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .daylight-mode .footer {
      background: rgba(255, 255, 255, 0.95);
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-links a:hover {
      color: var(--accent-color);
    }

    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    .loading-text {
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 0 16px;
      }

      .header-actions {
        gap: 8px;
      }

      .btn-text {
        padding: 0 12px;
        font-size: 13px;
      }

      .main {
        padding-top: 70px;
        padding-bottom: 120px;
      }

      .hero {
        padding: 30px 16px 40px;
      }

      .cards-container {
        padding: 0 16px;
      }

      .card {
        padding: 16px;
      }

      .card-icon {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }

      .footer {
        padding: 12px 16px;
      }

      .footer-links {
        gap: 12px;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">LOADING</div>
  </div>

  <header class="header">
    <div class="header-logo">
      <img src="images/logo.svg" alt="Astras.CC">
    </div>
    <div class="header-actions">
      <button class="btn btn-text" id="theme-toggle-btn" onclick="toggleTheme()">日间</button>
      <button class="btn btn-text" id="lang-toggle-btn" onclick="toggleLang()">EN</button>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <h1 class="hero-title">Astras.CC</h1>
      <p class="hero-subtitle" data-i18n="subtitle">第三方网站导航 - 探索更多精彩内容</p>
    </section>

    <section class="cards-container" id="cards-container">
    </section>
  </main>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://github.com/ningqi24/astras.cc" target="_blank" rel="noopener">GitHub</a>
      <a href="https://qm.qq.com/q/ynYzV85oHY" target="_blank" rel="noopener">QQ群</a>
    </div>
    <p data-i18n="copyright">2026 Bilibili@ningqi 参与制作</p>
  </footer>

  <script>
    let siteButtons = [];
    let currentTheme = localStorage.getItem('selectedTheme') || 'dark';
    let currentLang = localStorage.getItem('selectedLang') || 'zh';

    const translations = {
      zh: {
        'subtitle': '第三方网站导航 - 探索更多精彩内容',
        'copyright': '2026 Bilibili@ningqi 参与制作',
        '日间': '日间',
        '夜间': '夜间',
        'EN': '中文'
      },
      en: {
        'subtitle': 'Third-party website navigation - Explore more',
        'copyright': '2026 Made by Bilibili@ningqi',
        '日间': 'Day Mode',
        '夜间': 'Night Mode',
        'EN': '中文',
        '中文': 'EN'
      }
    };

    async function loadSiteButtons() {
      try {
        const response = await fetch('site.json');
        if (!response.ok) throw new Error('Failed to load site.json');
        const data = await response.json();
        siteButtons = data.buttons || [];
        renderCards();
      } catch (error) {
        console.error('Error loading site buttons:', error);
      }
    }

    function renderCards() {
      const container = document.getElementById('cards-container');
      if (!container) return;
      
      container.innerHTML = '';
      
      const icons = ['🌐', '✨', '📧', '🏠', '⚡', '📥', '🔍', '🎨', '🎮', '💻', '💬', '🐙'];
      
      siteButtons.forEach((button, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => navigateTo(button.url);
        
        const icon = icons[index % icons.length];
        const title = currentLang === 'zh' ? button.name : (button.name_en || button.name);
        
        card.innerHTML = `
          <div class="card-icon">${icon}</div>
          <div class="card-content">
            <div class="card-title">${title}</div>
            <div class="card-subtitle">${button.subtitle}</div>
          </div>
          <div class="card-arrow">→</div>
        `;
        
        container.appendChild(card);
      });
    }

    function navigateTo(url) {
      const loading = document.getElementById('loading');
      if (loading) loading.classList.remove('hidden');
      setTimeout(() => {
        window.location.href = url;
      }, 300);
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('selectedTheme', currentTheme);
      applyTheme();
    }

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('selectedLang', currentLang);
      applyLang();
    }

    function applyTheme() {
      const themeBtn = document.getElementById('theme-toggle-btn');
      if (themeBtn) {
        themeBtn.textContent = currentTheme === 'dark' ? '日间' : '夜间';
      }

      if (currentTheme === 'light') {
        document.documentElement.classList.add('daylight-mode');
      } else {
        document.documentElement.classList.remove('daylight-mode');
      }
    }

    function applyLang() {
      const langBtn = document.getElementById('lang-toggle-btn');
      if (langBtn) {
        langBtn.textContent = currentLang === 'zh' ? 'EN' : '中文';
      }

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });

      siteButtons.forEach((button, index) => {
        const cards = document.querySelectorAll('.card');
        if (cards[index]) {
          const title = currentLang === 'zh' ? button.name : (button.name_en || button.name);
          const titleEl = cards[index].querySelector('.card-title');
          if (titleEl) titleEl.textContent = title;
        }
      });
    }

    function autoDetectTheme() {
      const autoDetect = localStorage.getItem('themeAutoDetect') !== 'false';
      if (autoDetect) {
        const hour = new Date().getHours();
        currentTheme = hour >= 6 && hour < 18 ? 'light' : 'dark';
        localStorage.setItem('selectedTheme', currentTheme);
        localStorage.setItem('themeAutoDetect', 'true');
      }
      applyTheme();
    }

    function autoDetectLang() {
      const autoDetect = localStorage.getItem('langAutoDetect') !== 'false';
      if (autoDetect) {
        const userLang = navigator.language || navigator.userLanguage;
        currentLang = userLang.startsWith('zh') ? 'zh' : 'en';
        localStorage.setItem('selectedLang', currentLang);
        localStorage.setItem('langAutoDetect', 'true');
      }
      applyLang();
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!localStorage.getItem('selectedTheme')) {
        autoDetectTheme();
      } else {
        applyTheme();
      }
      
      if (!localStorage.getItem('selectedLang')) {
        autoDetectLang();
      } else {
        applyLang();
      }
      
      loadSiteButtons();
    });

    window.addEventListener('load', () => {
      const loading = document.getElementById('loading');
      if (loading) loading.classList.add('hidden');
    });
  </script>
</body>
</html>
