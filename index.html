<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astras.CC by ningqi - 第三方网站</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <style>
    :root {
      --sf-img-1: url("images/logo.svg");
    }
  </style>
  <style>
    :root {
      --bg-color: #111;
      --bg-secondary: #222;
      --text-primary: #eee;
      --text-secondary: #888;
      --accent-color: #66ccff;
      --scrollbar-thumb: #666;
      --scrollbar-thumb-hover: #777;
      --scrollbar-thumb-active: #555;
      --font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-weight: 500;
      --font-weight-bold: 700;
    }

    ::-webkit-scrollbar {
      background-color: var(--bg-color);
    }

    ::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar-thumb);
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: var(--scrollbar-thumb-hover);
    }

    ::-webkit-scrollbar-thumb:active {
      background-color: var(--scrollbar-thumb-active);
    }

    * {
      box-sizing: border-box;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      position: relative;
      overflow-x: hidden;
      font-weight: 500;
      background-color: var(--bg-color);
      color: var(--text-primary);
      -webkit-text-size-adjust: 100%;
    }

    .bg-ae {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vmax;
      height: 80vmax;
      z-index: 1;
      opacity: 0.06;
      pointer-events: none;
      color: var(--text-primary, #fff);
    }

    .bg-ae svg {
      width: 100%;
      height: 100%;
    }

    .bg-ae text {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.3;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
    }

    img {
      max-width: 100%;
    }

    .slogan {
      color: #fff;
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 70px;
      font-weight: bold;
      text-shadow: 10px 10px 20px #111;
      white-space: nowrap;
      display: inline-block;
      animation: blink-caret 0.75s step-end infinite;
      overflow: hidden;
      will-change: width;
      transition: width 1.6s cubic-bezier(0.76, 0, 0.42, 0.99), border-right 0.3s ease;
    }

    .slogan span {
      display: inline-block;
    }

    .slogan.typing-done {
      border-right: none;
    }

    @keyframes blink-caret {

      from,
      to {
        border-color: transparent;
      }

      50% {
        border-color: #0099ff;
      }
    }

    .tab {
      display: flex;
      position: fixed;
      background-color: rgba(34, 34, 34, 0.75);
      width: 100%;
      margin: 0;
      left: 0;
      top: 0;
      height: 60px;
      padding: 10px 0;
      justify-content: space-between;
      z-index: 1000;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .page {
      position: relative;
      min-height: calc(100vh - 60px);
      padding-top: 60px;
      animation: fadeIn 0.4s ease-out;
      width: 100%;
      overflow-x: hidden;
      z-index: 1;
    }

    .horizontal-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: calc(100vh - 60px);
      font-family: "Mi Sans", "Segoe UI", "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .h-card {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 56px;
      padding: 12px 18px;
      background-color: rgba(34, 34, 34, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, transform 0.15s ease;
      user-select: none;
      text-align: left;
      gap: 12px;
    }

    .h-card:not(:last-child) {
      margin-bottom: 8px;
    }

    .h-card:hover {
      background-color: rgba(102, 204, 255, 0.1);
      border-color: rgba(102, 204, 255, 0.25);
      transform: translateY(-1px);
    }

    .h-card:hover .h-card-title {
      color: #66ccff;
    }

    .h-card:hover .h-card-subtitle {
      color: rgba(102, 204, 255, 0.7);
    }

    .category-header {
      width: 100%;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      margin-top: 8px;
      padding-left: 4px;
    }

    .filter-bar {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background-color: rgba(34, 34, 34, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      color: var(--text-secondary);
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    .daylight-mode .search-wrap {
      background-color: rgba(255, 255, 255, 0.6);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .search-wrap:focus-within {
      border-color: var(--accent-color);
      background-color: rgba(102, 204, 255, 0.06);
    }

    .daylight-mode .search-wrap:focus-within {
      background-color: rgba(102, 204, 255, 0.04);
    }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 0.9rem;
      color: var(--text-primary);
      font-family: var(--font-family);
      font-weight: 500;
    }

    .search-input::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .tags-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag-filter-btn {
      background-color: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-family);
      white-space: nowrap;
    }

    .daylight-mode .tag-filter-btn {
      background-color: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .tag-filter-btn:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
      background-color: rgba(102, 204, 255, 0.06);
    }

    .tag-filter-btn.active {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
      color: #fff;
    }

    .empty-state {
      width: 100%;
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .category-header:first-child {
      margin-top: 0;
    }

    .card-group {
      width: 100%;
      margin-bottom: 24px;
    }

    .h-card-left {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      gap: 6px;
    }

    .h-card-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .daylight-mode .h-card-icon {
      background-color: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .h-card-icon img {
      width: 24px;
      height: 24px;
      display: block;
      border-radius: 4px;
    }

    .h-card-title-wrap {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 8px;
      flex-wrap: wrap;
    }

    .h-card-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      transition: color 0.25s ease;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .h-card-author {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent-color);
      background-color: rgba(102, 204, 255, 0.12);
      border: 1px solid rgba(102, 204, 255, 0.25);
      border-radius: 10px;
      padding: 1px 8px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      line-height: 1.5;
    }

    .h-card-author:hover {
      background-color: rgba(102, 204, 255, 0.25);
      border-color: var(--accent-color);
      color: #fff;
      transform: translateY(-1px);
    }

    .daylight-mode .h-card-author {
      background-color: rgba(102, 204, 255, 0.08);
      border-color: rgba(102, 204, 255, 0.3);
      color: var(--accent-color);
    }

    .daylight-mode .h-card-author:hover {
      background-color: rgba(102, 204, 255, 0.15);
      color: #0066aa;
    }

    .h-card-tag {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      color: #ffb86b;
      background-color: rgba(255, 184, 107, 0.12);
      border: 1px solid rgba(255, 184, 107, 0.25);
      border-radius: 10px;
      padding: 1px 8px;
      white-space: nowrap;
      line-height: 1.5;
      cursor: default;
      user-select: none;
    }

    .daylight-mode .h-card-tag {
      background-color: rgba(255, 152, 0, 0.08);
      border-color: rgba(255, 152, 0, 0.3);
      color: #e67e22;
    }

    .h-card-url {
      font-size: 0.78rem;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      transition: color 0.25s ease;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .h-card-subtitle {
      font-size: 0.85rem;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      transition: color 0.25s ease;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .h-card-detail-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
    }

    .h-card-detail-btn:hover {
      background-color: rgba(102, 204, 255, 0.18);
      color: var(--accent-color);
      transform: scale(1.1);
    }

    .daylight-mode .h-card-detail-btn {
      background-color: rgba(0, 0, 0, 0.05);
    }

    .daylight-mode .h-card-detail-btn:hover {
      background-color: rgba(102, 204, 255, 0.12);
    }

    .detail-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.25s ease;
      pointer-events: none;
    }

    .detail-modal-overlay.show {
      background-color: rgba(0, 0, 0, 0.55);
      pointer-events: auto;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .daylight-mode .detail-modal-overlay.show {
      background-color: rgba(0, 0, 0, 0.2);
    }

    .detail-modal {
      background-color: var(--bg-secondary);
      border: 1px solid var(--scrollbar-thumb);
      border-radius: 12px;
      width: 92%;
      max-width: 500px;
      max-height: 85vh;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      transform: translateY(12px);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font-family);
      display: flex;
      flex-direction: column;
    }

    .daylight-mode .detail-modal {
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
    }

    .detail-modal-overlay.show .detail-modal {
      transform: translateY(0);
      opacity: 1;
    }

    .detail-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .daylight-mode .detail-modal-close {
      background-color: rgba(0, 0, 0, 0.04);
    }

    .detail-modal-close:hover {
      background-color: rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
    }

    .daylight-mode .detail-modal-close:hover {
      background-color: rgba(0, 0, 0, 0.08);
    }

    .detail-modal-header {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--scrollbar-thumb);
      position: relative;
    }

    .detail-modal-project-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .detail-modal-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .daylight-mode .detail-modal-icon {
      background-color: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .detail-modal-icon img {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      display: block;
    }

    .detail-modal-title-wrap {
      flex: 1;
      min-width: 0;
      padding-right: 36px;
    }

    .detail-modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 4px 0;
      line-height: 1.3;
      word-break: break-word;
    }

    .detail-modal-domain {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    .detail-modal-desc {
      font-size: 0.88rem;
      color: var(--text-primary);
      line-height: 1.65;
      margin: 0;
      opacity: 0.85;
    }

    .detail-modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex: 1;
    }

    .detail-modal-section {
      margin-bottom: 16px;
    }

    .detail-modal-section:last-child {
      margin-bottom: 0;
    }

    .detail-modal-section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .detail-modal-creators {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-modal-creator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px 5px 5px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      font-size: 0.82rem;
      color: var(--text-primary);
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .daylight-mode .detail-modal-creator {
      background-color: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .detail-modal-creator:hover {
      background-color: rgba(102, 204, 255, 0.1);
      border-color: var(--accent-color);
    }

    .detail-modal-creator-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .daylight-mode .detail-modal-creator-avatar {
      background-color: rgba(0, 0, 0, 0.06);
    }

    .detail-modal-creator-avatar svg {
      width: 12px;
      height: 12px;
      color: var(--text-secondary);
    }

    .detail-modal-creator-name {
      font-weight: 600;
    }

    .detail-modal-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-modal-tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.78rem;
      font-weight: 600;
      color: #ffb86b;
      background-color: rgba(255, 184, 107, 0.12);
      border: 1px solid rgba(255, 184, 107, 0.25);
      border-radius: 999px;
      padding: 4px 12px;
      white-space: nowrap;
      cursor: default;
      user-select: none;
    }

    .daylight-mode .detail-modal-tag {
      background-color: rgba(255, 152, 0, 0.08);
      border-color: rgba(255, 152, 0, 0.3);
      color: #e67e22;
    }

    .detail-modal-url-box {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background-color: rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .daylight-mode .detail-modal-url-box {
      background-color: rgba(0, 0, 0, 0.02);
      border-color: rgba(0, 0, 0, 0.06);
    }

    .detail-modal-url-box:hover {
      border-color: var(--accent-color);
      background-color: rgba(102, 204, 255, 0.05);
    }

    .detail-modal-url-value {
      font-size: 0.78rem;
      color: var(--text-primary);
      word-break: break-all;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      flex: 1;
      opacity: 0.9;
    }

    .detail-modal-url-copy {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 6px;
      background-color: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      padding: 0;
    }

    .detail-modal-url-copy:hover {
      background-color: rgba(102, 204, 255, 0.12);
      color: var(--accent-color);
    }

    .detail-modal-url-copy.copied {
      color: #10b981;
      background-color: rgba(16, 185, 129, 0.12);
    }

    .detail-modal-footer {
      padding: 16px 24px 20px;
      display: flex;
      gap: 10px;
      border-top: 1px solid var(--scrollbar-thumb);
      flex-shrink: 0;
    }

    .detail-modal-btn {
      flex: 1;
      padding: 10px 18px;
      border: 1px solid transparent;
      border-radius: 8px;
      font-size: 0.86rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .detail-modal-btn-close {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      border-color: var(--scrollbar-thumb);
    }

    .daylight-mode .detail-modal-btn-close {
      background-color: #fff;
    }

    .detail-modal-btn-close:hover {
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .daylight-mode .detail-modal-btn-close:hover {
      background-color: rgba(0, 0, 0, 0.03);
    }

    .detail-modal-btn-visit {
      background-color: var(--accent-color);
      color: #fff;
      border-color: var(--accent-color);
      flex: 1.5;
    }

    .detail-modal-btn-visit:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102, 204, 255, 0.3);
    }

    .detail-modal-btn-visit:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-100%);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    #tabLogo {
      height: 36px;
      margin-top: auto;
      margin-bottom: auto;
      margin-left: 24px;
      cursor: pointer;
    }

    .tabButtonTab {
      margin-top: auto;
      margin-bottom: auto;
      margin-right: 24px;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tabButton {
      background-color: #00000000;
      color: #eee;
      border: 0;
      height: 100%;
      width: auto;
      min-width: 50px;
      padding: 0 8px;

      border-radius: 12px;

      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      color: var(--text-secondary);

      left: 0;
      right: 0;
      background: var(--bg-secondary);
      backdrop-filter: blur(15px);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      z-index: 1000;
      max-height: 300px;
      overflow-y: auto;
      opacity: 0;
      transform: translateY(-8px);
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .custom-dropdown-menu.show {
      opacity: 1;
      transform: translateY(0);
      visibility: visible;
    }

    .custom-dropdown-option {
      padding: 11px 16px;
      cursor: pointer;
      transition: all 0.2s ease;

  const pointer = {
    container: document.querySelector(".pointer"),
    current_target: null,
    lastX: 0,

    isScrolling: false,
    scrollTimeout: null,
    rafId: null,
    isRunning: false,
    init() {
      document.addEventListener("mousemove", this.onMouseMove.bind(this), { passive: true });
      document.addEventListener("scroll", this.onScroll.bind(this), { passive: true, capture: true });
      document.addEventListener("mousedown", this.onMouseDown.bind(this), { passive: true });
      document.addEventListener("mouseup", this.onMouseUp.bind(this), { passive: true });
      window.addEventListener("resize", this.onResize.bind(this), { passive: true });
      this.bind_targets_events();
      this.startLoop();
    },
    startLoop() {
      if (this.isRunning) return;
      this.isRunning = true;
      const loop = () => {
        if (!this.isRunning) return;
        this.updatePosition();
        this.rafId = requestAnimationFrame(loop);
      };
      this.rafId = requestAnimationFrame(loop);
    },
    stopLoop() {
      this.isRunning = false;
      if (this.rafId) {
        cancelAnimationFrame(this.rafId);
        this.rafId = null;
      }
    },
    onMouseMove(e) {
      this.lastX = e.clientX;
      this.lastY = e.clientY;
    },
    onMouseDown(e) {
      const target = e.target;
      if (target && (
        target === document.documentElement ||
        target === document.body ||
        window.getComputedStyle(target).overflow === 'scroll' ||
        window.getComputedStyle(target).overflowY === 'scroll' ||
        window.getComputedStyle(target).overflowX === 'scroll' ||
        target.closest('.custom-dropdown-menu') !== null
      )) {
        const rect = target.getBoundingClientRect();
        const isNearScrollbarX = Math.abs(e.clientX - rect.right) < 20 && rect.height > window.innerHeight;
        const isNearScrollbarY = Math.abs(e.clientY - rect.bottom) < 20 && rect.width > window.innerWidth;
        if (isNearScrollbarX || isNearScrollbarY || target === document.documentElement || target === document.body) {
          this.isScrolling = true;
        }
      }
    },
    onMouseUp() {
      this.isScrolling = false;
    },
    updatePosition() {
      let x = this.lastX;
      let y = this.lastY;
      if (x === 0 && y === 0) return;
      if (this.current_target && this.current_target.isConnected) {
        const rect = this.current_target.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) {
          const center_x = rect.left + rect.width / 2;
          const center_y = rect.top + rect.height / 2;
          x = center_x + (x - center_x) * 0.5;
          y = center_y + (y - center_y) * 0.5;
        } else {
          this.current_target = null;
          this.container.style.setProperty("--width", "2.5rem");
          this.container.style.setProperty("--height", "2.5rem");
        }
      }
      this.container.style.transform = `translate(${x}px, ${y}px)`;
    },
    onScroll() {
      this.isScrolling = true;
      if (this.scrollTimeout) clearTimeout(this.scrollTimeout);
      this.scrollTimeout = setTimeout(() => {
        this.isScrolling = false;

      if (this.current_target && this.current_target.isConnected) {
        const rect = this.current_target.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) {

          this.container.style.setProperty("--width", "2.5rem");
          this.container.style.setProperty("--height", "2.5rem");

        }, 1500);

    }).catch(() => {});

  let currentArch = 'all';
  let currentSuffix = 'all';

  function detectArch(filename, platform) {
    const name = filename.toLowerCase();
    if (platform === 'windows') {
      if (name.includes('amd64') || name.includes('x86_64') || name.includes('x64') || name.includes('64bit') || name.includes('win64')) return 'x64';
      if (name.includes('i386') || name.includes('i686') || name.includes('x86') || name.includes('win32') || name.includes('ia32')) return 'x86';
      if (name.includes('arm64') || name.includes('aarch64')) return 'arm64';
      return 'x64';
    } else if (platform === 'macos') {
      if (name.includes('arm64') || name.includes('aarch64') || name.includes('apple-silicon') || name.includes('macos-arm')) return 'arm';
      if (name.includes('x64') || name.includes('x86_64') || name.includes('intel') || name.includes('macos-x64')) return 'x64';
      return 'x64';
    } else {
      if (name.includes('amd64') || name.includes('x86_64') || name.includes('x64') || name.includes('64bit')) return 'amd';
      if (name.includes('arm64') || name.includes('aarch64') || name.includes('armv8')) return 'arm';
      if (name.includes('armhf') || name.includes('armv7') || name.includes('armv6') || name.includes('rpi') || name.includes('hf')) return 'arm32';
      return 'amd';
    }
  }

  function detectSuffix(filename, platform) {
    const name = filename.toLowerCase();
    if (platform === 'windows') {
      if (name.endsWith('.exe')) return 'exe';
      if (name.endsWith('.msi')) return 'msi';
      if (name.endsWith('.appx') || name.endsWith('.appxBundle')) return 'appx';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    } else if (platform === 'macos') {
      if (name.endsWith('.dmg')) return 'dmg';
      if (name.endsWith('.pkg')) return 'pkg';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    } else {
      if (name.endsWith('.deb')) return 'deb';
      if (name.endsWith('.rpm')) return 'rpm';
      if (name.endsWith('.appimage') || name.includes('appimage')) return 'appimage';
      if (name.endsWith('.snap')) return 'snap';
      if (name.endsWith('.tar.gz') || name.endsWith('.tgz')) return 'tar';
      if (name.endsWith('.tar.xz') || name.endsWith('.txz')) return 'tarxz';
      if (name.endsWith('.pkg.tar.zst')) return 'pkgzst';
      if (name.endsWith('.tar.zst')) return 'tarzst';
      if (name.endsWith('.zip')) return 'zip';
      return 'other';
    }
  }

  function selectFilter(value, platform) {
    const archValues = ['amd', 'arm', 'arm32', 'x64', 'x86', 'arm64'];
    const suffixValues = ['deb', 'rpm', 'appimage', 'snap', 'tar', 'tarxz', 'pkgzst', 'tarzst', 'zip', 'exe', 'msi', 'dmg', 'pkg', 'appx'];
    const targetPlatform = platform || currentPlatform;
    const filterTabsEl = document.getElementById(`filter-tabs-${targetPlatform}`);
    if (!filterTabsEl) return;

    const allTab = filterTabsEl.querySelector('.filter-tab[data-i18n="全部"]');

    if (value === 'all') {
      currentArch = 'all';
      currentSuffix = 'all';
      filterTabsEl.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      if (allTab) {
        allTab.classList.add('active');
      }
    } else if (archValues.includes(value)) {
      const tab = filterTabsEl.querySelector(`.filter-tab[data-i18n="${value}"]`);
      if (tab) {
        if (tab.classList.contains('active')) {
          tab.classList.remove('active');
        } else {
          filterTabsEl.querySelectorAll('.filter-tab').forEach(t => {
            const tabValue = t.getAttribute('data-i18n');
            if (archValues.includes(tabValue)) {
              t.classList.remove('active');
            }
          });
          tab.classList.add('active');
        }
      }
      if (allTab) {
        allTab.classList.remove('active');
      }
    } else if (suffixValues.includes(value)) {
      const tab = filterTabsEl.querySelector(`.filter-tab[data-i18n="${value}"]`);
      if (tab) {
        if (tab.classList.contains('active')) {
          tab.classList.remove('active');
        } else {
          filterTabsEl.querySelectorAll('.filter-tab').forEach(t => {
            const tabValue = t.getAttribute('data-i18n');
            if (suffixValues.includes(tabValue)) {
              t.classList.remove('active');
            }
          });
          tab.classList.add('active');
        }
      }
      if (allTab) {
        allTab.classList.remove('active');
      }
    }

    let activeArch = 'all';
    let activeSuffix = 'all';

    filterTabsEl.querySelectorAll('.filter-tab.active').forEach(tab => {
      const tabValue = tab.getAttribute('data-i18n');
      if (archValues.includes(tabValue)) {
        activeArch = tabValue;
      } else if (suffixValues.includes(tabValue)) {
        activeSuffix = tabValue;
      }
    });

    currentArch = activeArch;
    currentSuffix = activeSuffix;

    const activeTabs = filterTabsEl.querySelectorAll('.filter-tab.active');
    const hasActiveFilters = activeTabs.length > 0 && !filterTabsEl.querySelector('.filter-tab.active[data-i18n="全部"]');

    if (!hasActiveFilters && activeTabs.length === 0) {
      currentArch = 'all';
      currentSuffix = 'all';
      filterTabsEl.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      if (allTab) {
        allTab.classList.add('active');
      }
    }

    filterDownloadItems(targetPlatform);
  }

  function filterDownloadItems(platform) {
    const targetPlatform = platform || currentPlatform;
    const itemsContainer = document.getElementById(`download-items-${targetPlatform}`);
    if (!itemsContainer) return;
    const items = itemsContainer.querySelectorAll('.download-item');
    items.forEach(item => {
      const itemArch = item.getAttribute('data-arch');
      const itemSuffix = item.getAttribute('data-suffix');
      const archMatch = currentArch === 'all' || itemArch === currentArch;
      const suffixMatch = currentSuffix === 'all' || itemSuffix === currentSuffix;
      item.style.display = archMatch && suffixMatch ? 'flex' : 'none';
    });
  }

    });
    document.querySelectorAll('#theme-toggle-btn a.tabButton').forEach(el => {
      el.textContent = currentTheme === 'dark' ? translations[currentLang]['夜间'] : translations[currentLang]['日间'];
    });
    document.querySelectorAll('.endby').forEach(el => {
      el.textContent = translations[currentLang]['Astras.CC'];
    });
    document.querySelectorAll('.introend').forEach(el => {
      el.textContent = translations[currentLang]['本项目与 AstraEditor 项目组 无关'];
    });
    document.querySelectorAll('.end-copyright').forEach(el => {
      el.textContent = translations[currentLang]['2026 Bilibili@ningqi 参与制作'];
    });
    renderSiteButtons();
  }

  function applyTheme() {
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) {
      btn.innerHTML = `<a href="javascript:void(0)" class="tabButton">${currentTheme === 'dark' ? translations[currentLang]['夜间'] : translations[currentLang]['日间']}</a>`;
    }
    if (currentTheme === 'light') {
      document.documentElement.classList.add('daylight-mode');
      document.body.classList.add('daylight-mode');
    } else {
      document.documentElement.classList.remove('daylight-mode');
      document.body.classList.remove('daylight-mode');
    }
  }

  function autoDetectTheme() {
    const autoDetect = localStorage.getItem('themeAutoDetect') !== 'false';
    if (autoDetect) {
      const hour = new Date().getHours();
      if (hour >= 6 && hour< 18) {
        currentTheme = 'light';
      } else {
        currentTheme = 'dark';
      }
      localStorage.setItem('selectedTheme', currentTheme);
      localStorage.setItem('themeAutoDetect', 'true');
      applyTheme();
    }
  }

  function autoDetectLang() {
    const autoDetect = localStorage.getItem('langAutoDetect') !== 'false';
    if (autoDetect) {
      const userLang = navigator.language || navigator.userLanguage;
      if (userLang.startsWith('zh')) {
        currentLang = 'zh';
      } else {
        currentLang = 'en';
      }
      localStorage.setItem('selectedLang', currentLang);
      localStorage.setItem('langAutoDetect', 'true');
      applyLang();
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (!localStorage.getItem('selectedTheme')) {
      autoDetectTheme();
    } else {
      applyTheme();
    }
    if (!localStorage.getItem('selectedLang')) {
      autoDetectLang();
    } else {
      applyLang();
    }
    loadSiteButtons();
    initAeScrollEffect();
  });

  document.addEventListener('click', function(event) {
    if (!event.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown.show').forEach(el => el.classList.remove('show'));
    }
    if (!event.target.closest('.custom-dropdown')) {
      document.querySelectorAll('.custom-dropdown-menu.show').forEach(el => el.classList.remove('show'));
    }
    if (!event.target.closest('.download-card') && !event.target.closest('.download-card-content')) {
      hideDownloadPanel();
    }
  });

  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
      closeDetailModal();
    }
  });

  function animateToPage(url) {
    const loadingContainer = document.querySelector(".loading");
    if (loadingContainer) loadingContainer.classList.remove("loading_out");
    setTimeout(() => {
      window.location.href = url;
    }, 1000);
  }

  window.addEventListener("load", () => {
    const loadingContainer = document.querySelector(".loading");
    if (loadingContainer) loadingContainer.classList.add("loading_out");
  });

  function initAeScrollEffect() {
    const bgAe = document.querySelector('.bg-ae');
    if (!bgAe) return;

    function handleScroll() {
      const scrollY = window.scrollY;
      const windowHeight = window.innerHeight;
      const documentHeight = Math.max(
        document.body.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.clientHeight,
        document.documentElement.scrollHeight,
        document.documentElement.offsetHeight
      );
      const scrollableHeight = documentHeight - windowHeight;
      
      if (scrollableHeight > 0) {
        const scrollProgress = scrollY / scrollableHeight;
        
        const translateX = (scrollProgress * 2 - 1) * 27;
        const translateY = Math.sin(scrollProgress * Math.PI) * 27;
        
        bgAe.style.transform = `translate(-50%, -50%) translateX(${translateX}vmax) translateY(${translateY}vmax)`;
      }
    }

    window.addEventListener('scroll', handleScroll);
    handleScroll();
  }</script>
</body>
</html>
